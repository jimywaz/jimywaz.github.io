<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.author }}</title>

  <!-- Favicon -->
  <link rel="icon" id="favicon" type="image/svg+xml">

  <!-- Style -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/images.css' | relative_url }}">
</head>
<body>
  <!-- Read favicon from JS -->
  <div class="favicon-data"></div>

  <header>
    <h1>{{ page.title }}</h1>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ site.time | date: "%Y" }} 
      <a href="{{ site.social.github }}" target="_blank" rel="noopener noreferrer">
        {{ site.author }}
      </a>
    </p>
  </footer>

  <script src="{{ '/assets/js/index.js' | relative_url }}"></script>

</body>
</html>
